<h2>Add Employee</h2>
<form method="POST">
    {% csrf_token %}
    Name: <input type="text" name="name"><br><br>
    Email: <input type="email" name="email"><br><br>
    Salary: <input type="number" name="salary"><br><br>
    <button type="submit">Save</button>
</form>

<a href="/view/">View Employees</a>
