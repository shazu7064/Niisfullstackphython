<!DOCTYPE html>
<html>
<head>
<style>

/* Universal Selector */
* {
  font-family: Arial;
}

/* Element Selector */
p {
  color: blue;
}

/* ID Selector */
#main {
  color: red;
}

/* Class Selector */
.box {
  background-color: yellow;
}

</style>
</head>
<body>

<h1 id="main">This is heading (ID selector)</h1>

<p>This is paragraph (Element selector)</p>

<p class="box">This is paragraph (Class selector)</p>

</body>
</html>
